# Конфигурация Promtail для hw5 — собирает логи из всех контейнеров docker.
#
# docker_sd_configs делает service discovery через Docker API: Promtail сам
# находит все запущенные контейнеры, не нужно перечислять каждый.
# relabel_configs прокидывает Docker-метаданные в лейблы Loki:
#   - container — имя контейнера (с обрезанным ведущим слэшем)
#   - service   — имя сервиса docker-compose (по нему фильтруем в Grafana)
#   - image     — образ
# По этим лейблам потом ищем логи через LogQL.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    pipeline_stages:
      - docker: {}

    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
        regex: '/(.*)'

      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'

      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
