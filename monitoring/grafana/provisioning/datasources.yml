# Provisioning datasources для Grafana — hw5.
#
# При старте Grafana читает этот файл и автоматически подключает Prometheus
# и Loki. Не нужно ходить в UI и добавлять руками.
#
# URL'ы используют service-имена docker-сети (`prometheus`, `loki`), а не
# localhost — Grafana обращается к ним изнутри docker-сети.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
