name: Deploy

on:
  push:
    branches: [week*]

jobs:
  checks:
    uses: ./.github/workflows/typecheck.yaml

  build:
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: back
            build_args: ""
          - service: front
            build_args: --build-arg VITE_API_URL=${{ vars.VITE_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build & push ${{ matrix.service }}
        run: |
          IMAGE="${{ secrets.DOCKER_USER }}/todo-${{ matrix.service }}"
          docker build --platform linux/amd64 ${{ matrix.build_args }} \
            -t "$IMAGE:sha-${{ github.sha }}" \
            -t "$IMAGE:latest" \
            "${{ matrix.service }}"
          docker push "$IMAGE:sha-${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/myapp
            sed -i "s|^APP_VERSION=.*|APP_VERSION=sha-${{ github.sha }}|" .env.development.compose
            docker compose --env-file .env.development.compose pull back front
            docker compose --env-file .env.development.compose up -d --no-deps back front

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke deployed stack
        env:
          E2E_BASE_URL: ${{ vars.VITE_API_URL }}
        run: |
          export E2E_BASE_URL="${E2E_BASE_URL%/api}"
          for i in 1 2 3 4 5 6; do
            curl -sSf --max-time 5 "${E2E_BASE_URL}/api/health" >/dev/null && break
            echo "back not ready, try $i"; sleep 5
          done
          bash scripts/smoke.sh

  notify:
    needs: [checks, build, deploy, verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPO="${{ github.repository }} @ ${{ github.ref_name }}"
          CHECKS="${{ needs.checks.result }}"
          BUILD="${{ needs.build.result }}"
          DEPLOY="${{ needs.deploy.result }}"
          VERIFY="${{ needs.verify.result }}"
          
          if [ "$CHECKS" != "success" ]; then
            TEXT="❌ Type-check упал%0A${REPO}%0A${RUN_URL}"
          elif [ "$BUILD" != "success" ]; then
            TEXT="❌ Build упал%0A${REPO}%0A${RUN_URL}"
          elif [ "$DEPLOY" != "success" ]; then
            TEXT="❌ Deploy упал%0A${REPO}%0A${RUN_URL}"
          elif [ "$VERIFY" != "success" ]; then
            TEXT="❌ Smoke не прошёл%0A${REPO}%0A${RUN_URL}"
          else
            TEXT="✅ Деплой успешен%0A${REPO}%0AActor: ${{ github.actor }}%0AVersion: sha-${{ github.sha }}"
          fi
          
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT" \
            -d "disable_web_page_preview=true")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "Telegram API rejected"; exit 1; }