
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.development.db
    ports: ["15432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  back:
    image: ${DOCKERHUB_USERNAME}/todo-back:${APP_VERSION}
    restart: unless-stopped
    env_file: .env.development.back
    environment:
      APP_VERSION: ${APP_VERSION}
    ports: ["13000:3000"]
    depends_on:
      db:
        condition: service_healthy
    volumes: ["./app-config:/app/config:ro"]
    platform: linux/amd64
  front:
    image: ${DOCKERHUB_USERNAME}/todo-front:${APP_VERSION}
    restart: unless-stopped
    ports: [ "18080:80" ]
    depends_on:
      back:
        condition: service_started
    platform: linux/amd64

volumes:
  pgdata:
