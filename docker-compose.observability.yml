# Observability-стек для hw5.
#
# Этот файл — override-compose, накладывается поверх основного docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml \
#                  --env-file .env.development.compose up -d
#
# Удобнее через Makefile-цели: `make up-observability` / `make down-observability`.
#
# Контракт:
#   - все 5 сервисов слушают ТОЛЬКО на 127.0.0.1 (snaplisten).
#     Docker пишет правила в iptables в обход UFW, поэтому биндинг без
#     явного 127.0.0.1 = порт виден снаружи на публичном IP.
#   - наружу через системный nginx + TLS выставляется ТОЛЬКО Grafana
#     (subdomain grafana.<твой-домен>); остальное смотрится через SSH-туннель.
#   - сети явно не объявляем: сервисы автоматически попадают в общий
#     project-default-network (обычно `myapp_default`), где уже живут
#     db/back/front из основного docker-compose.yml. Именно за счёт этого
#     Prometheus видит `back:3000` и Promtail — Docker socket.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    privileged: true
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
